name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: CLI help smoke
        run: |
          bun run src/index.ts --help
          bun run src/index.ts vpn --help
          bun run src/index.ts auth --help
          bun run src/bins/protonvpn.ts --help
          bun run src/bins/protonauth.ts --help
